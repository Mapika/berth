name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --frozen ruff check src tests

      - name: Type check
        run: uv run --frozen mypy src

      - name: Tests
        run: uv run --frozen pytest tests/unit tests/integration -q

      - name: Build package
        run: uv build

  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Build UI
        run: npm run build

      - name: Check packaged UI is current
        working-directory: .
        run: git diff --exit-code -- src/berth/ui

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs git history

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Python deps (frozen)
        run: uv sync --frozen --extra dev

      - name: Bandit (Python SAST)
        run: uv run --with bandit bandit -r src --severity-level medium --confidence-level medium

      - name: pip-audit (Python deps)
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          uv run --with pip-audit pip-audit --strict --requirement /tmp/requirements.txt

      - name: npm audit signatures + advisories
        working-directory: ui
        run: |
          npm ci --ignore-scripts
          npm audit signatures
          npm audit --omit=dev --audit-level=high

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
