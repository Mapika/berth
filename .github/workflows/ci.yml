name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --frozen ruff check src tests

      - name: Type check
        run: uv run --frozen mypy src

      - name: Tests
        run: uv run --frozen pytest tests/unit tests/integration -q

      - name: Build package
        run: uv build

  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Check packaged UI is current
        working-directory: .
        run: git diff --exit-code -- src/serve_engine/ui
