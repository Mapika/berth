version: 2
updates:
  # Pin actions by SHA; Dependabot resolves the latest SHA per tag each week.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    groups:
      ui:
        patterns: ["*"]
